<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-4" y="-4" width="40" height="40">
      <feGaussianBlur stdDeviation="0.8" result="b1"/>
      <feGaussianBlur stdDeviation="1.8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="centerGlow" filterUnits="userSpaceOnUse" x="10" y="6" width="20" height="20">
      <feGaussianBlur stdDeviation="1.2" result="b1"/>
      <feGaussianBlur stdDeviation="2.8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0044aa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#1a6fff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff"  stop-opacity="1"/>
    </linearGradient>

    <clipPath id="clip">
      <rect x="0" y="0" width="32" height="32" rx="6"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#050d1f"/>

  <g clip-path="url(#clip)">
    <!-- Incoming beam -->
    <rect x="0" y="14.8" width="20" height="2.4" fill="url(#beamGrad)" filter="url(#glow)"/>

    <!-- 3 outgoing rays: upper, middle, lower -->
    <line x1="20" y1="16" x2="31" y2="5"  stroke="#4499ff" stroke-width="1.4" opacity="0.9" filter="url(#glow)"/>
    <line x1="20" y1="16" x2="32" y2="16" stroke="#4499ff" stroke-width="1.4" opacity="0.9" filter="url(#glow)"/>
    <line x1="20" y1="16" x2="31" y2="27" stroke="#4499ff" stroke-width="1.4" opacity="0.9" filter="url(#glow)"/>

    <!-- Endpoint dots -->
    <circle cx="31" cy="5"  r="1.8" fill="#88ccff" filter="url(#glow)"/>
    <circle cx="32" cy="16" r="1.8" fill="#88ccff" filter="url(#glow)"/>
    <circle cx="31" cy="27" r="1.8" fill="#88ccff" filter="url(#glow)"/>

    <!-- Center burst -->
    <circle cx="20" cy="16" r="5"   fill="#0d3acc" opacity="0.35" filter="url(#centerGlow)"/>
    <circle cx="20" cy="16" r="2.8" fill="#2255ee" opacity="0.65" filter="url(#centerGlow)"/>
    <circle cx="20" cy="16" r="1.4" fill="#55aaff" opacity="1"/>
    <circle cx="20" cy="16" r="0.6" fill="#ffffff"  opacity="1"/>
  </g>
</svg>
